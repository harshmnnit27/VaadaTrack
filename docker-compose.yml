version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: vaadatrack_backend
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    container_name: vaadatrack_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
